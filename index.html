<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Surfactants Presentation</title>
  <meta http-equiv="refresh" content="0; url=./surfactants_journey_presentation_stable.html" />
  <style>
    :root {
      color-scheme: light;
      --bg: #eef6f7;
      --ink: #173047;
      --muted: #587182;
      --card: rgba(255, 255, 255, 0.94);
      --line: rgba(23, 48, 71, 0.12);
      --accent: #1f7f83;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Aptos", "Segoe UI", Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 15%, rgba(255,255,255,0.95), transparent 24%),
        linear-gradient(140deg, #eef6f7 0%, #deedf1 54%, #edf5f7 100%);
    }

    body {
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      max-width: 720px;
      padding: 28px;
      border-radius: 24px;
      background: var(--card);
      border: 1px solid var(--line);
      box-shadow: 0 24px 56px rgba(12, 32, 49, 0.12);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      line-height: 1.05;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.5;
    }

    a {
      color: white;
      text-decoration: none;
      display: inline-block;
      padding: 12px 18px;
      border-radius: 999px;
      background: var(--accent);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Surfactants Presentation</h1>
    <p>Redirecting to the published presentation…</p>
    <a href="./surfactants_journey_presentation_stable.html">Open presentation</a>
  </main>
</body>
</html>
